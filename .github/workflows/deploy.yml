name: deploy

# Manual trigger by default. Flip the `push` block on once you trust the pipeline.
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Tag to push (defaults to git SHA)'
        required: false
  # push:
  #   branches: [main]

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
  ECS_SERVICE: ${{ vars.ECS_SERVICE }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      id-token: write # required for OIDC role assumption
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve image tag
        id: tag
        run: |
          TAG="${{ inputs.image_tag }}"
          if [ -z "$TAG" ]; then TAG="${GITHUB_SHA::7}"; fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPOSITORY:$TAG"
          docker build -t "$IMAGE" -t "$REGISTRY/$ECR_REPOSITORY:latest" .
          docker push "$IMAGE"
          docker push "$REGISTRY/$ECR_REPOSITORY:latest"
          echo "Pushed $IMAGE"

      # The ECS task definition pins to `:latest`, so a forced new deployment
      # is enough to roll the service. If you pin tasks to immutable tags,
      # render a new task-def revision here instead.
      - name: Trigger ECS rolling deploy
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment \
            --no-cli-pager

      - name: Wait for service to stabilise
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE"
